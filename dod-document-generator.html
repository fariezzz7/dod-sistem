<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOD — Document Generator</title>
<style>
/* ── SCREEN ONLY: App UI ── */
@media screen {
  :root {
    --blue:#1A5CC8;--bluebg:#EEF4FF;--blueb:rgba(26,92,200,0.2);
    --green:#0F7A48;--greenbg:#EDFAF3;--greenb:rgba(15,122,72,0.2);
    --red:#C02840;--redbg:#FFF0F3;--redb:rgba(192,40,64,0.2);
    --purple:#6E30C8;--purplebg:#F4EEFF;
    --bg:#F2F4F9;--bg2:#fff;--bg3:#EAECF4;
    --text:#1A2040;--textd:#5A6480;--textm:#9AA0B8;
    --line:rgba(0,0,0,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;font-size:13px;}
  #print_target{position:fixed;left:-9999px;top:-9999px;width:210mm;visibility:hidden;}

  nav{background:#fff;border-bottom:1px solid var(--line);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 rgba(0,0,0,0.05);}
  .nav-logo{font-size:13px;font-weight:700;color:var(--blue);letter-spacing:.04em;}
  .nav-logo span{color:var(--textm);font-weight:400;}

  .app{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 52px);}
  .sidebar{background:#fff;border-right:1px solid var(--line);overflow-y:auto;padding:16px;}
  .preview-pane{background:var(--bg3);overflow-y:auto;padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px;}

  .sb-sect{margin-bottom:18px;}
  .sb-hd{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--textm);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .sb-hd::after{content:"";flex:1;height:1px;background:var(--line);}

  .doc-btns{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:2px;}
  .db{padding:8px 6px;border:1px solid var(--line);background:var(--bg3);border-radius:6px;cursor:pointer;text-align:center;transition:all .12s;width:100%;}
  .db:hover{border-color:var(--blueb);background:var(--bluebg);}
  .db.on{background:var(--bluebg);border-color:var(--blueb);color:var(--blue);font-weight:600;}
  .db .ic{font-size:16px;display:block;margin-bottom:2px;}
  .db .lb{font-size:10px;font-weight:600;}

  .fld{margin-bottom:8px;}
  .fld label{display:block;font-size:10px;font-weight:600;color:var(--textd);margin-bottom:3px;}
  .fld input,.fld select,.fld textarea{width:100%;background:var(--bg3);border:1px solid var(--line);color:var(--text);padding:6px 8px;font-size:12px;font-family:Arial,sans-serif;border-radius:5px;}
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--blue);background:#fff;}
  .fld textarea{resize:vertical;min-height:48px;}

  .items-wrap{border:1px solid var(--line);border-radius:6px;overflow:hidden;}
  .item-hdr{display:grid;grid-template-columns:1fr 40px 68px 18px;gap:3px;padding:5px 7px;background:var(--bg3);font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--textm);}
  .irow{display:grid;grid-template-columns:1fr 40px 68px 18px;gap:3px;padding:4px 7px;border-top:1px solid rgba(0,0,0,0.04);align-items:center;}
  .irow input{background:transparent;border:none;padding:3px 2px;font-size:11px;color:var(--text);font-family:Arial,sans-serif;width:100%;}
  .irow input:focus{outline:none;background:var(--bluebg);border-radius:3px;padding:3px 5px;}
  .irow input[type=number]{text-align:right;}
  .btn-rm{background:none;border:none;color:var(--textm);cursor:pointer;font-size:12px;line-height:1;}
  .btn-rm:hover{color:var(--red);}
  .btn-add{width:100%;padding:6px;background:var(--bg3);border:none;border-top:1px dashed var(--line);color:var(--textd);font-size:11px;cursor:pointer;transition:all .12s;}
  .btn-add:hover{background:var(--bluebg);color:var(--blue);}

  .btn-print-ui{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;box-shadow:0 3px 10px rgba(26,92,200,0.3);}
  .btn-print-ui:hover{background:#2470F0;}

  .preview-toolbar{display:flex;gap:8px;align-items:center;width:740px;}
  .tb-label{font-size:9px;color:var(--textm);flex:1;font-weight:600;letter-spacing:.1em;text-transform:uppercase;}
  .btn-clr{padding:7px 12px;background:var(--bg3);color:var(--textd);border:1px solid var(--line);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;}
  .btn-prt{padding:7px 14px;background:var(--green);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(15,122,72,0.3);}

  .preview-frame{width:740px;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,0.1);border-radius:4px;overflow:hidden;}
  .preview-frame .doc-page{transform:scale(0.93);transform-origin:top left;width:calc(100% / 0.93);}
}

/* ── PRINT ONLY ── */
@media print {
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fff !important; }
  #screen_app { display:none !important; }
  #print_target { position:static !important; left:auto !important; top:auto !important; visibility:visible !important; display:block !important; }
  .doc-page { width:100%; }
  @page { size:A4 portrait; margin:12mm 14mm; }
  img { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
  .d-logo { display:block !important; width:80pt !important; height:auto !important; }
  * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
}

/* ── DOCUMENT STYLES (both screen preview + print) ── */
.doc-page {
  background:#fff;
  font-family:Arial,Helvetica,sans-serif;
  font-size:11pt;
  color:#111;
  padding:28pt 32pt;
  min-height:297mm;
  position:relative;
  display:flex;
  flex-direction:column;
  gap:0;
}

/* Header */
.d-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18pt;}
.d-logo{width:80pt;height:auto;}
.d-co-right{text-align:right;}
.d-co-name{font-size:13pt;font-weight:700;color:#0A0E1A;letter-spacing:.01em;}
.d-co-reg{font-size:7pt;color:#888;margin-top:1pt;}
.d-co-addr{font-size:8pt;color:#666;margin-top:4pt;line-height:1.6;}

/* Title strip */
.d-strip{display:flex;align-items:center;justify-content:space-between;padding:9pt 14pt;border-radius:5pt;margin-bottom:14pt;}
.d-strip-title{font-size:17pt;font-weight:700;color:#fff;letter-spacing:.06em;}
.d-strip-num{font-size:10pt;font-weight:600;color:rgba(255,255,255,0.85);font-family:Courier,monospace;}

/* Meta row */
.d-meta{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10pt;margin-bottom:12pt;}
.d-meta-lbl{font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#999;margin-bottom:2pt;}
.d-meta-val{font-size:9pt;font-weight:600;color:#111;}

/* Parties */
.d-parties{display:grid;grid-template-columns:1fr 1fr;gap:12pt;padding:10pt 12pt;background:#F7F8FC;border:1pt solid #E0E4EF;border-radius:5pt;margin-bottom:12pt;}
.d-pty-lbl{font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#999;margin-bottom:4pt;}
.d-pty-name{font-size:10pt;font-weight:700;color:#0A0E1A;margin-bottom:2pt;}
.d-pty-det{font-size:8pt;color:#666;line-height:1.55;}

/* Items table */
.d-tbl{width:100%;border-collapse:collapse;margin-bottom:10pt;font-size:9pt;}
.d-tbl thead tr{background:#0A0E1A;}
.d-tbl thead th{font-size:7pt;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,0.75);padding:7pt 8pt;text-align:left;font-weight:600;}
.d-tbl thead th.r{text-align:right;}
.d-tbl tbody tr{border-bottom:1pt solid #EBEEF6;}
.d-tbl tbody tr:nth-child(even){background:#F7F8FC;}
.d-tbl tbody td{padding:6pt 8pt;color:#111;}
.d-tbl tbody td.r{text-align:right;font-family:Courier,monospace;}
.d-tbl tbody td.idx{color:#AAB;font-family:Courier,monospace;font-size:8pt;}

/* Total box */
.d-total-wrap{display:flex;justify-content:flex-end;margin-bottom:8pt;}
.d-total-box{width:210pt;}
.d-trow{display:flex;justify-content:space-between;padding:4pt 0;border-bottom:1pt solid #EBEEF6;font-size:9pt;color:#666;}
.d-trow .tv{font-family:Courier,monospace;color:#111;}
.d-tfinal{background:#0A0E1A;border-radius:5pt;padding:8pt 11pt;display:flex;justify-content:space-between;align-items:center;margin-top:6pt;}
.d-tfinal-lbl{font-size:8pt;color:rgba(255,255,255,0.6);font-weight:700;letter-spacing:.04em;}
.d-tfinal-val{font-family:Courier,monospace;font-size:15pt;font-weight:700;color:#fff;}

/* Extra boxes */
.d-rcvd{background:#EDFAF3;border:1pt solid #8DD5B0;border-radius:4pt;padding:7pt 10pt;display:flex;justify-content:space-between;align-items:center;margin-top:4pt;}
.d-rcvd-lbl{font-size:9pt;font-weight:700;color:#0F7A48;}
.d-rcvd-val{font-family:Courier,monospace;font-size:13pt;font-weight:700;color:#0F7A48;}
.d-os{background:#FFF0F3;border:1pt solid #F0A0B0;border-radius:4pt;padding:7pt 10pt;display:flex;justify-content:space-between;align-items:center;margin-top:3pt;}
.d-os-lbl{font-size:9pt;font-weight:700;color:#C02840;}
.d-os-val{font-family:Courier,monospace;font-size:12pt;font-weight:700;color:#C02840;}

/* Words */
.d-words{font-size:8pt;color:#888;font-style:italic;margin-bottom:10pt;padding:7pt 10pt;background:#F7F8FC;border-radius:4pt;border-left:2pt solid #CCD0E0;line-height:1.5;}

/* Pay box */
.d-paybox{padding:9pt 11pt;border-radius:5pt;margin-bottom:10pt;font-size:8pt;}
.d-paybox.inv{background:#EEF4FF;border:1pt solid #AFC4EF;}
.d-paybox.quo{background:#EEF4FF;border:1pt solid #AFC4EF;}
.d-paybox.po{background:#EDFAF3;border:1pt solid #8DD5B0;}
.d-paybox.rec{background:#F4EEFF;border:1pt solid #C4A8EF;}
.d-pay-title{font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5pt;}
.d-pay-det{line-height:1.8;color:#222;}
.d-pay-det strong{font-weight:700;}

/* Notes */
.d-notes{margin-bottom:10pt;}
.d-notes-lbl{font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#999;margin-bottom:5pt;}
.d-notes-body{font-size:8pt;color:#666;line-height:1.65;}
.d-notes-body ol{padding-left:13pt;}
.d-notes-body li{margin-bottom:2pt;}

/* Signatures */
.d-sigs{display:grid;grid-template-columns:1fr 1fr;gap:36pt;margin-top:auto;padding-top:24pt;}
.d-sig-line{border-bottom:1pt solid #0A0E1A;height:40pt;margin-bottom:4pt;}
.d-sig-lbl{font-size:7pt;color:#AAB;letter-spacing:.05em;text-transform:uppercase;}

/* Footer */
.d-foot{margin-top:auto;padding-top:10pt;border-top:1pt solid #E0E4EF;text-align:center;}
.d-foot-txt{font-size:7pt;color:#BBB;letter-spacing:.06em;}

/* PAID stamp */
.d-stamp{position:absolute;top:100pt;right:32pt;transform:rotate(-12deg);opacity:.12;}
.d-stamp-txt{font-family:Courier,monospace;font-size:36pt;font-weight:700;border:4pt solid #0F7A48;color:#0F7A48;padding:3pt 10pt;border-radius:3pt;letter-spacing:.12em;}
</style>
</head>
<body>

<!-- SCREEN APP -->
<div id="screen_app">
<nav>
  <div class="nav-logo">DOD <span>/ Document Generator</span></div>
  <div style="font-size:11px;color:#9AA0B8">DOD WORLDWIDE SUPPLY &nbsp;·&nbsp; Semenyih, Selangor</div>
</nav>

<div class="app">
<div class="sidebar">
  <div class="sb-sect">
    <div class="sb-hd">Document Type</div>
    <div class="doc-btns">
      <button class="db on" onclick="setType('invoice',this)"><span class="ic">🧾</span><span class="lb">Invoice</span></button>
      <button class="db" onclick="setType('quotation',this)"><span class="ic">📋</span><span class="lb">Quotation</span></button>
      <button class="db" onclick="setType('po',this)"><span class="ic">📦</span><span class="lb">Purchase Order</span></button>
      <button class="db" onclick="setType('receipt',this)"><span class="ic">✅</span><span class="lb">Receipt</span></button>
      <button class="db" onclick="setType('letter',this)"><span class="ic">📝</span><span class="lb">Reminder Letter</span></button>
    </div>
  </div>
  <div class="sb-sect">
    <div class="sb-hd">Document Info</div>
    <div class="fld"><label>Document Number</label><input type="text" id="f_num" placeholder="I-000100" oninput="render()"></div>
    <div class="fld"><label>Date</label><input type="date" id="f_date" oninput="render()"></div>
    <div class="fld"><label id="due_lbl">Due Date</label><input type="date" id="f_due" oninput="render()"></div>
    <div class="fld"><label>Terms</label>
      <select id="f_terms" onchange="render()">
        <option>C.O.D.</option><option>NET 7 Days</option><option>NET 14 Days</option>
        <option>NET 30 Days</option><option>70% Deposit</option><option>Full Payment Upfront</option>
      </select>
    </div>
  </div>
  <div class="sb-sect">
    <div class="sb-hd" id="to_lbl">Bill To (Customer)</div>
    <div class="fld"><label>Name / Company</label><input type="text" id="f_to" placeholder="Customer name" oninput="render()"></div>
    <div class="fld"><label>Address / Organisation</label><textarea id="f_addr" rows="2" placeholder="Address" oninput="render()"></textarea></div>
    <div class="fld"><label>Tel</label><input type="text" id="f_tel" placeholder="0123456789" oninput="render()"></div>
    <div class="fld"><label>Reference / Job Name</label><input type="text" id="f_ref" placeholder="e.g. BAJU SUKAN 50PCS" oninput="render()"></div>
  </div>
  <div class="sb-sect" id="sup_sec" style="display:none">
    <div class="sb-hd">Supplier Info</div>
    <div class="fld"><label>Supplier Name</label><input type="text" id="f_sup" value="NOHAD SDN BHD" oninput="render()"></div>
    <div class="fld"><label>Supplier Address</label><textarea id="f_supaddr" rows="2" oninput="render()"></textarea></div>
  </div>
  <div class="sb-sect">
    <div class="sb-hd">Line Items</div>
    <div class="items-wrap">
      <div class="item-hdr"><span>Description</span><span>Qty</span><span style="text-align:right">Price</span><span></span></div>
      <div id="items_list"></div>
      <button class="btn-add" onclick="addItem()">＋ Add Item</button>
    </div>
  </div>
  <div class="sb-sect" id="pay_sec" style="display:none">
    <div class="sb-hd">Payment Received</div>
    <div class="fld"><label>Payment Method</label>
      <select id="f_paymeth" onchange="render()">
        <option>Bank Transfer (Maybank)</option><option>Cash</option>
        <option>Online Transfer</option><option>Cheque</option>
      </select>
    </div>
    <div class="fld"><label>Amount Received (RM)</label><input type="number" id="f_payamt" placeholder="0.00" step="0.01" oninput="render()"></div>
    <div class="fld"><label>Payment Date</label><input type="date" id="f_paydate" oninput="render()"></div>
  </div>
  <div class="sb-sect">
    <div class="sb-hd">Notes (Optional)</div>
    <div class="fld"><textarea id="f_notes" rows="3" placeholder="Custom notes..." oninput="render()"></textarea></div>
  </div>
  <button class="btn-print-ui" onclick="doPrint()">🖨️ Print / Save as PDF</button>
</div>

<div class="preview-pane">
  <div class="preview-toolbar">
    <div class="tb-label">Live Preview</div>
    <button class="btn-clr" onclick="clearAll()">↺ Clear</button>
    <button class="btn-prt" onclick="doPrint()">🖨️ Print / Save PDF</button>
  </div>
  <div class="preview-frame">
    <div class="doc-page" id="preview_doc"></div>
  </div>
</div>
</div>
</div>

<!-- PRINT TARGET (hidden on screen, shown on print) -->
<div id="print_target">
  <div class="doc-page" id="print_doc"></div>
</div>

window.addEventListener("load", () => {
  const d = new Date().toISOString().split("T")[0];
  document.getElementById("f_date").value = d;
  document.getElementById("f_paydate").value = d;
  const [yr,mo] = d.split("-");
  // DOD invoice number format: DOD-YYYYMM-XXXX
  document.getElementById("f_num").value = "DOD-" + yr + mo + "-0001";

  // ── AUTO-FILL FROM MASTERLIST (localStorage) ───────────────────────
  try {
    const raw = localStorage.getItem("dod_docgen_payload");
    if (raw) {
      localStorage.removeItem("dod_docgen_payload"); // consume once
      const p = JSON.parse(raw);
      // Map masterlist payload to docgen format
      const data = {
        type:   p.type || "invoice",  // supports: invoice, quotation, po, receipt, letter
        num:    p.inv_number || "",
        date:   p.inv_date || p.order_date || d,
        due:    p.due_date || "",
        toName: p.cust_name || "",
        toTel:  p.cust_tel || "",
        toAddr: p.cust_addr || "",
        ref:    p.name_job || p.inv_number || "",
        items:  p.items || [],
        payAmt: p.paid || 0,
      };
      // Set address field separately
      if (data.toAddr) {
        setTimeout(() => {
          const addrEl = document.getElementById("f_addr");
          if (addrEl) addrEl.value = data.toAddr;
        }, 100);
      }
      // Pass _notes if present
      if (p._notes) data._notes = p._notes;
      autoFillFromMasterlist(data);
      return;
    }
  } catch(e) {
    console.warn("localStorage payload error:", e);
  }

  // ── AUTO-FILL FROM MASTERLIST (URL hash) ──────────────────────────
  const hash = window.location.hash.slice(1);
  if(hash) {
    try {
      const data = JSON.parse(decodeURIComponent(escape(atob(hash))));
      autoFillFromMasterlist(data);
      return; // render() called inside autoFillFromMasterlist
    } catch(e) {
      console.warn("Could not parse URL data:", e);
    }
  }

  // Default: blank form with sample items
  addItem("SUBLIMATION SHORT SLEEVE COLLAR", 1, 0);
  addItem("", 1, 0);
  addItem("", 1, 0);
  render();
})

function autoFillFromMasterlist(d) {
  // Set document type
  const typeMap = {invoice:"invoice", quotation:"quotation", po:"po", receipt:"receipt", letter:"letter"};
  const t = typeMap[d.type] || "invoice";
  const btn = document.querySelector(`.db[onclick="setType('${t}',this)"]`);
  if(btn) setType(t, btn);

  // Document number
  if(d.num) document.getElementById("f_num").value = d.num;

  // Dates
  if(d.date) document.getElementById("f_date").value = d.date;
  if(d.due)  document.getElementById("f_due").value  = d.due;

  // To / customer
  if(d.toName) document.getElementById("f_to").value   = d.toName;
  if(d.toTel)  document.getElementById("f_tel").value  = d.toTel;
  if(d.ref)    document.getElementById("f_ref").value  = d.ref;
  if(d.toAddr) { const addrEl = document.getElementById("f_addr"); if(addrEl) addrEl.value = d.toAddr; }

  // Supplier (PO)
  if(d.supName) document.getElementById("f_sup").value = d.supName;

  // Payment / Deposit amount
  if(d.payAmt && d.payAmt > 0) {
    document.getElementById("f_payamt").value = d.payAmt;
    if(!document.getElementById("f_paydate").value)
      document.getElementById("f_paydate").value = new Date().toISOString().split("T")[0];
  }
  // Store balance for invoice display
  if(d.balance !== undefined) window._docBalance = d.balance;
  if(d.total !== undefined)   window._docTotal   = d.total;

  // Line items
  items = []; itemCtr = 0;
  if(d.items && d.items.length) {
    d.items.forEach(it => addItem(it.desc||"", it.qty||1, it.price||0));
  } else {
    addItem("", 1, 0);
  }
  // Always have at least 2 blank rows for manual add
  if(items.length < 3) { addItem("",1,0); addItem("",1,0); }

  // Set notes from payload if provided
  if(d._notes) {
    const nEl = document.getElementById("f_notes");
    if(nEl) nEl.value = d._notes;
  }

  render();

  // Flash notification
  const note = document.createElement("div");
  note.style.cssText = "position:fixed;top:60px;right:20px;background:#0F7A48;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:opacity .5s;";
  note.textContent = "✓ Data auto-filled from Masterlist";
  document.body.appendChild(note);
  setTimeout(() => { note.style.opacity="0"; setTimeout(()=>note.remove(), 600); }, 2500);
};

function setType(t, btn) {
  docType = t;
  document.querySelectorAll(".db").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  document.getElementById("sup_sec").style.display = t==="po" ? "block" : "none";
  document.getElementById("pay_sec").style.display = t==="receipt" ? "block" : "none";
  document.getElementById("to_lbl").textContent = t==="po" ? "Order To" : "Bill To (Customer)";
  document.getElementById("due_lbl").textContent = t==="quotation" ? "Valid Until" : "Due Date";
  // For letter type - hide items section, show notes prominently
  const itemsSect = document.getElementById("items_list")?.closest(".sb-sect");
  if(itemsSect) itemsSect.style.display = t==="letter" ? "none" : "block";
  const cur = document.getElementById("f_num").value.replace(/^[A-Z]+-/,"");
  document.getElementById("f_num").value = TYPES[t].pfx + cur;
  render();
}

function addItem(desc="", qty=1, price=0) {
  items.push({id:++itemCtr, desc, qty, price});
  rebuildUI();
}
function removeItem(id) {
  items = items.filter(i=>i.id!==id);
  rebuildUI(); render();
}
function rebuildUI() {
  document.getElementById("items_list").innerHTML = items.map(it=>`
    <div class="irow">
      <input type="text" value="${(it.desc||"").replace(/"/g,"&quot;")}" placeholder="Description"
        oninput="upd(${it.id},'desc',this.value)" onchange="upd(${it.id},'desc',this.value)">
      <input type="number" min="1" value="${it.qty}"
        oninput="upd(${it.id},'qty',this.value)" onchange="upd(${it.id},'qty',this.value)">
      <input type="number" min="0" step="0.01" value="${it.price||""}" placeholder="0.00"
        oninput="upd(${it.id},'price',this.value)" onchange="upd(${it.id},'price',this.value)">
      <button class="btn-rm" onclick="removeItem(${it.id})">✕</button>
    </div>`).join("");
}
function upd(id, field, val) {
  const it = items.find(i=>i.id===id);
  if(!it) return;
  if(field==="qty") it.qty = parseFloat(val)||0;
  else if(field==="price") it.price = parseFloat(val)||0;
  else it[field] = val;
  render();
}

  items=[]; itemCtr=0;

  render();
}

function n2w(n) {
  const ones=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten",
    "Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const tens=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  function b1k(n){
    if(n<20) return ones[n];
    if(n<100) return tens[Math.floor(n/10)]+(n%10?" "+ones[n%10]:"");
    return ones[Math.floor(n/100)]+" Hundred"+(n%100?" "+b1k(n%100):"");
  }
  if(!n||n===0) return "ZERO RINGGIT MALAYSIA ONLY";
  const ip=Math.floor(n), cts=Math.round((n-ip)*100);
  let w="";
  if(ip>=1000000) w+=b1k(Math.floor(ip/1000000))+" Million ";
  if(ip>=1000) w+=b1k(Math.floor((ip%1000000)/1000))+" Thousand ";
  if(ip%1000) w+=b1k(ip%1000);
  w=w.trim().toUpperCase();
  return "RINGGIT MALAYSIA "+w+(cts>0?" AND "+b1k(cts).toUpperCase()+" CENTS":"")+" ONLY";
}
function fmtRM(n){ return "RM "+Number(n||0).toLocaleString("en-MY",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){
  if(!d) return "—";
  const [y,m,dy]=d.split("-");
  return dy+"/"+m+"/"+y;
}

function buildDocHTML() {
  const num   = document.getElementById("f_num").value||"—";
  const date  = document.getElementById("f_date").value;
  const due   = document.getElementById("f_due").value;
  const terms = document.getElementById("f_terms").value;
  const toNm  = document.getElementById("f_to").value||"—";
  const toAd  = document.getElementById("f_addr").value||"";
  const toTel = document.getElementById("f_tel").value||"";
  const ref   = document.getElementById("f_ref").value||"";

  // ── REMINDER LETTER — separate template ──────────────────
  if(docType === "letter") return buildLetterHTML({num,date,due,toNm,toAd,toTel,ref});
  const notesRaw = document.getElementById("f_notes").value||DEF_NOTES[docType];
  const supNm = document.getElementById("f_sup").value||"NOHAD SDN BHD";
  const supAd = document.getElementById("f_supaddr").value||"";
  const pmeth = document.getElementById("f_paymeth").value;
  const pamt  = parseFloat(document.getElementById("f_payamt").value)||0;
  const pdate = document.getElementById("f_paydate").value;

  const validItems = items.filter(i=>i.desc||i.price>0);
  const total = validItems.reduce((s,i)=>s+(i.qty*i.price),0);
  const T = TYPES[docType];

  const itemRows = validItems.length
    ? validItems.map((it,idx)=>`<tr>
        <td class="idx">${idx+1}.</td>
        <td>${it.desc||"—"}</td>
        <td class="r">${it.qty}</td>
        <td class="r" style="color:#AAB">PCS</td>
        <td class="r">${Number(it.price).toFixed(2)}</td>
        <td class="r" style="font-weight:700">${Number(it.qty*it.price).toFixed(2)}</td>
      </tr>`).join("")
    : `<tr><td colspan="6" style="text-align:center;padding:18pt;color:#CCC;font-size:9pt">No items added</td></tr>`;

  let payHTML="";
  if(docType==="invoice"||docType==="quotation")
    payHTML=`<div class="d-paybox ${docType==="invoice"?"inv":"quo"}">
      <div class="d-pay-title" style="color:${T.payColor}">Payment Information</div>
      <div class="d-pay-det">Bank: <strong>${CO.bank}</strong> &nbsp;&middot;&nbsp; Account No: <strong>${CO.acc}</strong><br>Account Name: <strong>${CO.accname}</strong></div>
    </div>`;
  else if(docType==="po")
    payHTML=`<div class="d-paybox po">
      <div class="d-pay-title" style="color:#0F7A48">Purchase Order Details</div>
      <div class="d-pay-det">Please supply the above items as per specifications.<br>Supplier: <strong>${supNm}</strong>${supAd?`<br>${supAd}`:""}</div>
    </div>`;
  else
    payHTML=`<div class="d-paybox rec">
      <div class="d-pay-title" style="color:#6E30C8">Payment Received</div>
      <div class="d-pay-det">Method: <strong>${pmeth}</strong> &nbsp;&middot;&nbsp; Date: <strong>${fmtDate(pdate)}</strong></div>
    </div>`;

  const noteLines = notesRaw.split("\n").map(l=>l.replace(/^\d+\.\s*/,"")).filter(Boolean);
  const notesHTML=`<div class="d-notes"><div class="d-notes-lbl">Notes</div>
    <div class="d-notes-body"><ol>${noteLines.map(l=>`<li>${l}</li>`).join("")}</ol></div></div>`;

  const sig2lbl = docType==="po"?"RECEIVED & ACKNOWLEDGED &mdash; SUPPLIER"
                : docType==="receipt"?"RECEIVED BY &mdash; CUSTOMER":"";
  const sigsHTML=`<div class="d-sigs">
    <div><div class="d-sig-line"></div><div class="d-sig-lbl">AUTHORISED SIGNATURE &mdash; DOD WORLDWIDE SUPPLY</div></div>
    <div><div class="d-sig-line"></div><div class="d-sig-lbl">${sig2lbl}</div></div>
  </div>`;

  let rcvdHTML="";
  if(docType==="receipt") {
    const dispAmt = pamt>0?pamt:total;
    rcvdHTML=`<div class="d-rcvd"><span class="d-rcvd-lbl">Amount Received</span><span class="d-rcvd-val">${fmtRM(dispAmt)}</span></div>`;
    if(pamt>0 && pamt<total)
      rcvdHTML+=`<div class="d-os"><span class="d-os-lbl">Outstanding Balance</span><span class="d-os-val">${fmtRM(total-pamt)}</span></div>`;
  } else if(docType==="invoice" && pamt>0 && pamt<total) {
    rcvdHTML=`<div class="d-rcvd" style="background:#e8f4ed;"><span class="d-rcvd-lbl">Deposit Received (${Math.round(pamt/total*100)}%)</span><span class="d-rcvd-val" style="color:#0F7A48;">${fmtRM(pamt)}</span></div>`;
    rcvdHTML+=`<div class="d-os"><span class="d-os-lbl">Balance Due</span><span class="d-os-val">${fmtRM(total-pamt)}</span></div>`;
  }

  const stamp = docType==="receipt"?`<div class="d-stamp"><div class="d-stamp-txt">PAID</div></div>`:"";

  return `
  ${stamp}
  <div class="d-header">
    <img class="d-logo" src="${LOGO}" alt="DOD">
    <div class="d-co-right">
      <div class="d-co-name">${CO.name}</div>
      <div class="d-co-reg">(${CO.reg})</div>
      <div class="d-co-addr">${CO.addr1}<br>${CO.addr2}<br>Tel: ${CO.tel}</div>
    </div>
  </div>

  <div class="d-strip" style="background:${T.bg}">
    <div class="d-strip-title">${T.lbl}</div>
    <div class="d-strip-num">No. &nbsp;${num}</div>
  </div>

  <div class="d-meta">
    <div><div class="d-meta-lbl">Date</div><div class="d-meta-val">${fmtDate(date)}</div></div>
    <div><div class="d-meta-lbl">${docType==="quotation"?"Valid Until":"Due Date"}</div><div class="d-meta-val">${due?fmtDate(due):"—"}</div></div>
    <div><div class="d-meta-lbl">Terms</div><div class="d-meta-val">${terms}</div></div>
    <div><div class="d-meta-lbl">Reference</div><div class="d-meta-val" style="font-size:8pt">${ref||"—"}</div></div>
  </div>

  <div class="d-parties">
    <div>
      <div class="d-pty-lbl">${docType==="po"?"SUPPLIER":"BILL TO"}</div>
      <div class="d-pty-name">${toNm}</div>
      ${toAd?`<div class="d-pty-det">${toAd.replace(/\n/g,"<br>")}</div>`:""}
      ${toTel?`<div class="d-pty-det">Tel: ${toTel}</div>`:""}
    </div>
    <div>
      <div class="d-pty-lbl">FROM</div>
      <div class="d-pty-name">${CO.name}</div>
      <div class="d-pty-det">${CO.addr1}<br>${CO.addr2}</div>
      <div class="d-pty-det">Tel: ${CO.tel}</div>
    </div>
  </div>

  <table class="d-tbl">
    <thead><tr>
      <th style="width:22pt">#</th>
      <th>Description</th>
      <th class="r" style="width:40pt">Qty</th>
      <th class="r" style="width:38pt">UOM</th>
      <th class="r" style="width:72pt">Unit Price (RM)</th>
      <th class="r" style="width:80pt">Total (RM)</th>
    </tr></thead>
    <tbody>${itemRows}</tbody>
  </table>

  <div class="d-total-wrap">
    <div class="d-total-box">
      <div class="d-trow"><span>Subtotal</span><span class="tv">${Number(total).toFixed(2)}</span></div>
      <div class="d-trow"><span>Discount</span><span class="tv">0.00</span></div>
      <div class="d-trow"><span>Tax (SST)</span><span class="tv">0.00</span></div>
      <div class="d-tfinal">
        <div class="d-tfinal-lbl">TOTAL AMOUNT</div>
        <div class="d-tfinal-val">${fmtRM(total)}</div>
      </div>
      ${rcvdHTML}
    </div>
  </div>

  <div class="d-words">${n2w(docType==="receipt"&&pamt>0?pamt:(docType==="invoice"&&pamt>0&&pamt<total?(total-pamt):total))}</div>
  ${payHTML}
  ${notesHTML}
  ${sigsHTML}

  <div class="d-foot">
    <div class="d-foot-txt">THIS IS A COMPUTER GENERATED DOCUMENT AND NO SIGNATURE IS REQUIRED &nbsp;&middot;&nbsp; ${CO.name} &nbsp;&middot;&nbsp; ${CO.tel}</div>
  </div>`;
}

function render() {
  const html = buildDocHTML();
  document.getElementById("preview_doc").innerHTML = html;
}

function doPrint() {
  // Build HTML and inject into print target
  const html = buildDocHTML();
  document.getElementById("print_doc").innerHTML = html;
  // Wait for all images to load before printing
  const imgs = document.getElementById("print_doc").querySelectorAll("img");
  if (imgs.length === 0) {
    window.print();
    return;
  }
  let loaded = 0;
  const total = imgs.length;
  const tryPrint = () => {
    loaded++;
    if (loaded >= total) window.print();
  };
  imgs.forEach(img => {
    if (img.complete) { tryPrint(); }
    else { img.onload = tryPrint; img.onerror = tryPrint; }
  });
  // Fallback: print after 800ms regardless
  setTimeout(() => window.print(), 800);
}

function buildLetterHTML({num,date,due,toNm,toAd,toTel,ref}) {
  const notes = document.getElementById("f_notes").value || "";
  const pamt  = parseFloat(document.getElementById("f_payamt").value)||0;
  const validItems = items.filter(i=>i.desc||i.price>0);
  const totalOS = validItems.reduce((s,i)=>s+(i.qty*i.price),0);

  const dateFmt = date ? new Date(date).toLocaleDateString("ms-MY",{day:"numeric",month:"long",year:"numeric"}) : "—";
  const dueFmt  = due  ? new Date(due).toLocaleDateString("ms-MY",{day:"numeric",month:"long",year:"numeric"})  : "—";

  // Parse title from ref or use default
  const letterTitle = ref || "PERINGATAN PEMBAYARAN";

  // Build invoice table (only if items exist)
  const invoiceTable = validItems.length ? `
  <table style="width:100%;border-collapse:collapse;margin:20pt 0;font-size:10pt;">
    <thead>
      <tr style="background:#f0f0f0;">
        <th style="padding:6pt 8pt;text-align:left;border:1px solid #ddd;font-size:9pt;">NO. INVOIS / DESKRIPSI</th>
        <th style="padding:6pt 8pt;text-align:right;border:1px solid #ddd;font-size:9pt;width:100pt;">JUMLAH (RM)</th>
      </tr>
    </thead>
    <tbody>
      ${validItems.map((it,i)=>`
      <tr>
        <td style="padding:6pt 8pt;border:1px solid #ddd;">${it.desc||"—"}</td>
        <td style="padding:6pt 8pt;text-align:right;border:1px solid #ddd;font-family:monospace;">${Number(it.price).toFixed(2)}</td>
      </tr>`).join("")}
      <tr style="background:#fff3f3;">
        <td style="padding:8pt;border:1px solid #ddd;font-weight:700;text-align:right;">JUMLAH TERTUNGGAK</td>
        <td style="padding:8pt;border:1px solid #ddd;font-weight:700;text-align:right;font-family:monospace;color:#c00;">${fmtRM(totalOS)}</td>
      </tr>
    </tbody>
  </table>` : "";

  // Parse notes into paragraphs
  const noteParas = notes ? notes.split("\n\n").filter(Boolean)
    .map(p => `<p style="margin-bottom:10pt;line-height:1.7;">${p.replace(/\n/g,"<br>")}</p>`).join("") : "";

  return `
  <div class="doc-page" id="print_doc_inner">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24pt;padding-bottom:12pt;border-bottom:2px solid #0A0E1A;">
      <img src="${LOGO}" alt="DOD" style="width:70pt;height:auto;">
      <div style="text-align:right;font-size:9pt;color:#555;line-height:1.6;">
        <div style="font-size:13pt;font-weight:700;color:#0A0E1A;letter-spacing:.02em;">${CO.name}</div>
        <div>${CO.reg}</div>
        <div>${CO.addr1}</div>
        <div>${CO.addr2}</div>
        <div>${CO.tel}</div>
      </div>
    </div>

    <!-- Ref & Date -->
    <div style="display:flex;justify-content:space-between;margin-bottom:20pt;font-size:10pt;">
      <div><span style="color:#888;">Ruj:</span> <strong>${num}</strong></div>
      <div><span style="color:#888;">Tarikh:</span> <strong>${dateFmt}</strong></div>
    </div>

    <!-- Recipient -->
    <div style="margin-bottom:20pt;font-size:10pt;">
      <div style="font-weight:700;">${toNm}</div>
      ${toAd ? `<div style="color:#555;">${toAd}</div>` : ""}
      ${toTel ? `<div style="color:#555;">Tel: ${toTel}</div>` : ""}
    </div>

    <!-- Letter title -->
    <div style="background:#7C3AED;color:#fff;padding:10pt 14pt;border-radius:4pt;margin-bottom:20pt;">
      <div style="font-size:13pt;font-weight:700;letter-spacing:.04em;">${letterTitle}</div>
      ${due ? `<div style="font-size:9pt;opacity:.85;margin-top:3pt;">Sila bayar sebelum: ${dueFmt}</div>` : ""}
    </div>

    <!-- Body -->
    <div style="font-size:10.5pt;color:#1a1a1a;">
      ${noteParas || "<p>Dengan hormatnya, kami ingin menarik perhatian Tuan/Puan berkenaan baki pembayaran yang masih belum diselesaikan.</p>"}
    </div>

    <!-- Invoice table -->
    ${invoiceTable}

    <!-- Payment info box -->
    <div style="background:#f9f9f9;border:1px solid #ddd;border-left:4px solid #7C3AED;padding:12pt;border-radius:4pt;margin:20pt 0;font-size:10pt;">
      <div style="font-weight:700;margin-bottom:8pt;">MAKLUMAT PEMBAYARAN</div>
      <div style="display:flex;gap:40pt;">
        <div>
          <div style="color:#888;font-size:9pt;">Bank</div>
          <div style="font-weight:600;">${CO.bank}</div>
        </div>
        <div>
          <div style="color:#888;font-size:9pt;">No. Akaun</div>
          <div style="font-weight:600;font-family:monospace;">${CO.acc}</div>
        </div>
        <div>
          <div style="color:#888;font-size:9pt;">Nama Akaun</div>
          <div style="font-weight:600;">${CO.accname}</div>
        </div>
      </div>
      <div style="margin-top:8pt;font-size:9pt;color:#666;">Sila hantar bukti pembayaran selepas transfer dilakukan.</div>
    </div>

    <!-- Signature -->
    <div style="margin-top:40pt;display:flex;justify-content:flex-end;">
      <div style="text-align:center;min-width:160pt;">
        <div style="border-bottom:1px solid #333;padding-bottom:4pt;margin-bottom:6pt;">&nbsp;</div>
        <div style="font-size:9pt;font-weight:600;">${CO.name}</div>
        <div style="font-size:8pt;color:#888;">Tandatangan & Cop Rasmi</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="d-foot">
      <div class="d-foot-txt">THIS IS A COMPUTER GENERATED DOCUMENT &nbsp;&middot;&nbsp; ${CO.name} &nbsp;&middot;&nbsp; ${CO.tel}</div>
    </div>
  </div>`;
}

</script>
</body>
</html>
